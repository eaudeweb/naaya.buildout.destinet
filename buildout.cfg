effective-user = edw
user = q:q
var = ${buildout:directory}/var/
threads = 2
initialization =
    # Fix mixed implicit/explicit namespace packages.
    # Some eggs use pkg_resources.declare_namespace() (old style) while newer
    # versions of other eggs in the same namespace use PEP 420 implicit
    # namespaces (no __init__.py). When mixed, declare_namespace() takes over
    # __path__ and excludes implicit packages.
    import sys, os
    def _fix_ns_paths(packageName):
        mod = sys.modules.get(packageName)
        if mod is None:
            return
        ns_path = packageName.replace('.', os.sep)
        current = set(getattr(mod, '__path__', []))
        for sp in sys.path:
            candidate = os.path.join(sp, ns_path)
            if os.path.isdir(candidate) and candidate not in current:
                mod.__path__.append(candidate)
                current.add(candidate)
    try:
        import pkg_resources
        # Fix namespaces already declared during pkg_resources import
        for ns_name in list(pkg_resources._namespace_packages.keys()):
            _fix_ns_paths(ns_name)
        # Monkey-patch for future declare_namespace calls
        _orig_declare_ns = pkg_resources.declare_namespace
        def _patched_declare_namespace(packageName):
            _orig_declare_ns(packageName)
            _fix_ns_paths(packageName)
        pkg_resources.declare_namespace = _patched_declare_namespace
    except Exception:
        pass
    # Monkey-patch zope.interface._normalizeargs to handle broken __provides__
    # from Python 2 migration (ExtensionClass.ExtensionClass not iterable).
    try:
        import zope.interface.declarations as _zid
        _orig_normalizeargs = _zid._normalizeargs
        def _safe_normalizeargs(sequence, output=None):
            if output is None:
                output = []
            cls = sequence.__class__
            if _zid.InterfaceClass in cls.__mro__ or _zid.Implements in cls.__mro__:
                output.append(sequence)
            else:
                try:
                    for v in sequence:
                        _safe_normalizeargs(v, output)
                except TypeError:
                    pass
            return output
        _zid._normalizeargs = _safe_normalizeargs
    except Exception:
        pass
